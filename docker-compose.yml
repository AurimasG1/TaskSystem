version: '3.9'

services:
  mysql:
    image: mysql:8
    container_name: tasksystem-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tasksystem
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: TaskSystem.API/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: 'server=mysql;port=3306;database=tasksystem;user=root;password=root'
      Jwt__Key: 'SUPER_SECRET_KEY_123'
      Jwt__Issuer: 'TaskSystem'
    command: ['dotnet', 'TaskSystem.API.dll', '--migrate']

  api:
    build:
      context: .
      dockerfile: TaskSystem.API/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: 'Development'
      ConnectionStrings__DefaultConnection: 'server=mysql;port=3306;database=tasksystem;user=root;password=root'
      Jwt__Key: 'SUPER_SECRET_KEY_123'
      Jwt__Issuer: 'TaskSystem'
    ports:
      - '8080:8080'

volumes:
  mysql_data:
