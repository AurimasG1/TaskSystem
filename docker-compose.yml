name: tasksystem

x-api-environment: &api-environment
  ASPNETCORE_ENVIRONMENT: Development
  ASPNETCORE_URLS: http://+:8080
  ConnectionStrings__DefaultConnection: >-
    server=mysql;
    port=3306;
    database=${MYSQL_DATABASE:-tasksystem};
    user=${MYSQL_USER:-tasksystem_app};
    password=${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env};
  Jwt__Key: ${JWT_KEY:?Set JWT_KEY in .env}
  Jwt__Issuer: ${JWT_ISSUER:-TaskSystemAPI}

services:
  mysql:
    image: mysql:8.0
    container_name: tasksystem-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-tasksystem}
      MYSQL_USER: ${MYSQL_USER:-tasksystem_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in .env}
    volumes:
      - tasksystem_mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  migrate:
    build:
      context: .
      dockerfile: TaskSystem.API/Dockerfile
    container_name: tasksystem-migrate
    restart: "no"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      <<: *api-environment
    command:
      - dotnet
      - TaskSystem.API.dll
      - --migrate

  api:
    build:
      context: .
      dockerfile: TaskSystem.API/Dockerfile
    container_name: tasksystem-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      <<: *api-environment
    ports:
      - "127.0.0.1:${API_PORT:-8080}:8080"
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "--fail",
          "--silent",
          "--show-error",
          "http://localhost:8080/health"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - tasksystem_data_protection_keys:/home/app/.aspnet/DataProtection-Keys

volumes:
  tasksystem_mysql_data:
  tasksystem_data_protection_keys:
