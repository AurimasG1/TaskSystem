apiVersion: apps/v1
kind: Deployment
metadata:
  name: tasksystem-api
  namespace: tasksystem
  labels:
    app.kubernetes.io/name: tasksystem
    app.kubernetes.io/component: api
spec:
  replicas: 1
  revisionHistoryLimit: 3
  minReadySeconds: 5
  progressDeadlineSeconds: 120

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
      
  selector:
    matchLabels:
      app.kubernetes.io/name: tasksystem
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tasksystem
        app.kubernetes.io/component: api
    spec:
      terminationGracePeriodSeconds: 30

      securityContext:
        fsGroup: 1654
        fsGroupChangePolicy: OnRootMismatch

      containers:
        - name: api
          image: ghcr.io/aurimasg1/tasksystem:latest
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8080

          envFrom:
            - configMapRef:
                name: tasksystem-config

          env:
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: tasksystem-secrets
                  key: ConnectionStrings__DefaultConnection

            - name: Jwt__Key
              valueFrom:
                secretKeyRef:
                  name: tasksystem-secrets
                  key: Jwt__Key

          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 30

          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3

          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: data-protection-keys
              mountPath: /home/app/.aspnet/DataProtection-Keys

      volumes:
        - name: data-protection-keys
          persistentVolumeClaim:
            claimName: tasksystem-api-data-protection
