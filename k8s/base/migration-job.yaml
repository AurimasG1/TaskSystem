apiVersion: batch/v1
kind: Job
metadata:
  name: tasksystem-migrate
  namespace: tasksystem
  labels:
    app.kubernetes.io/name: tasksystem
    app.kubernetes.io/component: migration
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tasksystem
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never

      initContainers:
        - name: wait-for-mysql
          image: mysql:8.0
          imagePullPolicy: IfNotPresent
          env:
            - name: MYSQL_PWD
              valueFrom:
                secretKeyRef:
                  name: tasksystem-secrets
                  key: MYSQL_ROOT_PASSWORD
          command:
            - sh
            - -c
            - |
              until mysql \
                --host=mysql \
                --user=root \
                --protocol=TCP \
                --execute='SELECT 1;' >/dev/null 2>&1; do
                echo "Waiting for MySQL..."
                sleep 2
              done

              echo "MySQL is ready."

      containers:
        - name: migrate
          image: ghcr.io/aurimasg1/tasksystem:latest
          imagePullPolicy: Always
          args:
            - --migrate
          envFrom:
            - configMapRef:
                name: tasksystem-config
            - secretRef:
                name: tasksystem-secrets
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
