apiVersion: v1
kind: LimitRange
metadata:
  name: tasksystem-container-limits
  namespace: tasksystem
  labels:
    app.kubernetes.io/name: tasksystem
    app.kubernetes.io/component: governance

spec:
  limits:
    - type: Container

      defaultRequest:
        cpu: 50m
        memory: 64Mi

      default:
        cpu: 250m
        memory: 256Mi

      min:
        cpu: 10m
        memory: 16Mi

      max:
        cpu: "2"
        memory: 2Gi

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: tasksystem-resource-quota
  namespace: tasksystem
  labels:
    app.kubernetes.io/name: tasksystem
    app.kubernetes.io/component: governance

spec:
  hard:
    requests.cpu: "2"
    requests.memory: 3Gi
    limits.cpu: "5"
    limits.memory: 5Gi
    pods: "25"
    persistentvolumeclaims: "5"
